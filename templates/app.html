{% extends 'base.html' %}
{% block title %}Daily TODO List{% endblock %}

{% block content %}
<div class="container mt-4" style="font-family: 'Times New Roman', serif;">
    <h2 class="mb-4 text-primary fw-bold">21-Day Daily Task Tracker</h2>
    <form method="POST" action="/save">
        <div class="table-responsive shadow-lg rounded">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th scope="col">Day</th>
                    {% for task in tasks %}
                    <th scope="col">{{ task }}</th>
                    {% endfor %}
                </tr>
                </thead>
                <tbody>
                {% for day in days %}
                <tr>
                    <td class="fw-semibold">Day {{ day }}</td>
                    {% for task in tasks %}
                    <td class="text-center">
                        <div class="form-check d-flex justify-content-center">
                            <input class="form-check-input" type="checkbox" name="day{{day}}_{{task}}"
                                   {% if progress.get((day, task)) %}checked{% endif %}>
                        </div>
                    </td>
                    {% endfor %}
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
        <button type="submit" class="btn btn-success mt-3 px-4 py-2 fw-bold">
            Save Progress
        </button>
    </form>
</div>
{% endblock %}
